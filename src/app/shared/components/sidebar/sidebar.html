
<section class="bg-surface-low p-4  hidden md:flex flex-col h-screen"   [class.w-64]="isSidebarOpen" [class.w-20]="!isSidebarOpen" >
    <div>
        <img class="w-full" src="../../../../assets/logo.png" alt="">
    </div>

    <div class="mt-5 flex flex-col flex-1">
        <ul class="" >
          
                    <li class="py-2.5 px-3 title-md font-medium rounded-sm "><a routerLink="/project" routerLinkActive="bg-white"><img  class="inline " src="../../../../assets/projects.png" alt=""> @if (isSidebarOpen) {<span class="pl-3">Projects</span>}</a></li>

                    <li class="py-2.5 px-3 title-md font-medium" ><a   [routerLink]="['/project', projectId, 'epics']" routerLinkActive="bg-white" > <img  class="inline " src="../../../../assets/epics.png" alt="">
                         @if (isSidebarOpen) {
       
      <span class="pl-3">Project Epics</span>}</a></li>
                    <li class="py-2.5 px-3 title-md font-medium " routerLinkActive=bg-white,rounded-sm><a [routerLink]="['/project', projectId, 'tasks']" >  <img  class="inline " src="../../../../assets/tasks.png" alt="" > @if (isSidebarOpen) {<span class="pl-3"> Project Tasks</span>}</a></li>
                    <li class="py-2.5 px-3 title-md font-medium "><a [routerLink]="['/project', projectId, 'members']" routerLinkActive="bg-white"><img  class="inline " src="../../../../assets/members.png" alt=""> @if (isSidebarOpen) {<span class="pl-3">Project Members</span>}</a></li>
                    <li class="py-2.5 px-3 title-md font-medium "><a [routerLink]="['/project', projectId, 'edit']" routerLinkActive="bg-white"><img  class="inline" src="../../../../assets/details.png" alt=""> @if (isSidebarOpen) {<span class="pl-3">Project Details</span>}</a></li>
        </ul>
        
        <ul class="border-t border-t-light-gray pt-6 mt-auto ">
            <li  class=" py-2.5 px-3 title-md font-medium"> <button (click)="toggleSidebar()">@if (isSidebarOpen) { <img  class="inline pr-3" src="../../../../assets/back.png" alt="">}   @if (!isSidebarOpen) {<img  class="inline pr-3" src="../../../../assets/showSide.png" alt="">} @if (isSidebarOpen) {<span >Collapse</span>}</button></li>
            <li  class=" text-error py-2.5 px-3 title-md font-medium"><a routerLink="/"> <img  class="inline " src="../../../../assets/logOut.png" alt="">@if (isSidebarOpen) {<span class="pl-3">Log Out</span>}</a></li>
        </ul>
    </div>
</section>
